<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema EMI</title>
    <!-- Bootstrap y Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <style>
        /* ================= BODY ================= */
        body {
            background: #020b24;
            color: white;
            overflow-x: hidden;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* ================= LOGIN ================= */
        #login-page {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* FONDO */
        #login-page::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)),
                        url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3')
                        center/cover no-repeat;
            z-index: -1;
        }

        /* CONTENEDOR */
        .container-login {
            width: 1000px;
            height: 720px;
            display: flex;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,153,255,0.3);
        }

        /* PANEL IZQUIERDO */
        .left {
            width: 45%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
                        url('https://images.unsplash.com/photo-1498050108023-c5249f4df085')
                        center/cover no-repeat;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .left h1 {
            font-size: 55px;
            font-weight: bold;
            line-height: 65px;
        }

        .left span {
            color: #00bfff;
        }

        .left p {
            margin-top: 20px;
            font-size: 20px;
            color: #ddd;
        }

        /* PANEL DERECHO */
        .right {
            width: 55%;
            background: rgba(28, 40, 78, 0.95);
            padding: 50px;
        }

        /* LOGO */
        .logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #00bfff;
            padding: 5px;
            background: white;
            box-shadow: 0 0 30px #00bfff;
        }

        .logo h2 {
            margin-top: 20px;
            font-size: 40px;
            font-weight: bold;
        }

        .logo p {
            color: #ccc;
        }

        /* INPUTS */
        .input-box {
            position: relative;
            margin-top: 25px;
        }

        .input-box input {
            width: 100%;
            height: 60px;
            background: transparent;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 15px;
            outline: none;
            padding-left: 55px;
            color: white;
            font-size: 18px;
        }

        .input-box input:focus {
            border: 2px solid #00bfff;
            box-shadow: 0 0 10px #00bfff;
        }

        .input-box i {
            position: absolute;
            left: 20px;
            top: 20px;
            color: #00bfff;
            font-size: 20px;
        }

        /* BOTONES */
        .btn-login {
            width: 100%;
            height: 60px;
            margin-top: 30px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(90deg,#0072ff,#00bfff);
            color: white;
            font-size: 22px;
            font-weight: bold;
            transition: 0.4s;
            text-decoration: none;
            display: block;
            text-align: center;
            line-height: 60px;
        }

        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #00bfff;
        }

        /* RESPONSIVE */
        @media(max-width:1000px){
            .container-login{
                width:95%;
                flex-direction:column;
                height:auto;
            }
            .left{
                width:100%;
                height:300px;
            }
            .right{
                width:100%;
            }
        }
    </style>
</head>
<body>
<div id="login-page">
    <div class="container-login">
        <div class="left">
            <h1>BIENVENIDO<br><span>AL SISTEMA</span></h1>
            <p>Innovación • Tecnología • Futuro</p>
        </div>
        <div class="right">
            <div class="logo">
                <img src="{{ url_for('static', filename='logoemi.png') }}" class="logo-img">
                <h2>INICIAR SESIÓN</h2>
                <p>Sistema Web Seguro EMI Riberalta</p>
            </div>
            <form id="loginForm" method="POST" action="/login">
                <div class="input-box">
                    <i class="fas fa-user"></i>
                    <input type="text" name="usuario" id="usuario" placeholder="Usuario" required>
                </div>
                <div class="input-box">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" id="password" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> INICIAR SESIÓN
                
            </form>
        </div>
    </div>
</div>
</body>
</html>
