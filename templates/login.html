{% extends "base.html" %}

{% block title %}Login - Sistema EMI{% endblock %}

{% block head %}
<style>
    #login-page {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }

    #login-page::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)),
                    url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3')
                    center/cover no-repeat;
        z-index: -1;
    }

    .container-login {
        width: 1000px;
        max-width: 95%;
        display: flex;
        border-radius: 32px;
        overflow: hidden;
        box-shadow: 0 0 30px rgba(0,153,255,0.3);
        background: rgba(0,0,0,0.4);
    }

    .left {
        width: 45%;
        background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
                    url('https://images.unsplash.com/photo-1498050108023-c5249f4df085')
                    center/cover no-repeat;
        padding: 60px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .left h1 {
        font-size: 55px;
        font-weight: bold;
        line-height: 65px;
    }

    .left span {
        color: #00bfff;
    }

    .left p {
        margin-top: 20px;
        font-size: 20px;
        color: #ddd;
    }

    .right {
        width: 55%;
        background: rgba(28, 40, 78, 0.95);
        padding: 50px;
    }

    .logo {
        text-align: center;
        margin-bottom: 25px;
    }

    .logo-img {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        object-fit: cover;
        border: 5px solid #00bfff;
        padding: 5px;
        background: white;
        box-shadow: 0 0 30px #00bfff;
    }

    .logo h2 {
        margin-top: 20px;
        font-size: 40px;
        font-weight: bold;
    }

    .logo p {
        color: #ccc;
    }

    .input-box {
        position: relative;
        margin-top: 25px;
    }

    .input-box input {
        width: 100%;
        height: 60px;
        background: transparent;
        border: 2px solid rgba(255,255,255,0.15);
        border-radius: 15px;
        outline: none;
        padding-left: 55px;
        color: white;
        font-size: 18px;
    }

    .input-box input:focus {
        border: 2px solid #00bfff;
        box-shadow: 0 0 10px #00bfff;
    }

    .input-box i {
        position: absolute;
        left: 20px;
        top: 20px;
        color: #00bfff;
        font-size: 20px;
    }

    .btn-login {
        width: 100%;
        height: 60px;
        margin-top: 30px;
        border: none;
        border-radius: 15px;
        background: linear-gradient(90deg,#0072ff,#00bfff);
        color: white;
        font-size: 22px;
        font-weight: bold;
        transition: 0.4s;
        text-decoration: none;
        cursor: pointer;
    }

    .btn-login:hover {
        transform: scale(1.02);
        box-shadow: 0 0 20px #00bfff;
    }

    .toast {
        position: fixed;
        top: 30px;
        left: 50%;
        transform: translateX(-50%) translateY(-120px);
        background: linear-gradient(90deg, #dc3545, #ff4757);
        color: white;
        padding: 16px 32px;
        border-radius: 50px;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 16px;
        font-weight: 600;
        box-shadow: 0 10px 40px rgba(220, 53, 69, 0.5);
        opacity: 0;
        transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        z-index: 9999;
        min-width: 320px;
        justify-content: center;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-6px); }
        20%, 40%, 60%, 80% { transform: translateX(6px); }
    }

    .shake {
        animation: shake 0.5s ease-in-out;
    }

    @media(max-width:1000px) {
        .container-login {
            flex-direction: column;
            height: auto;
        }
        .left, .right {
            width: 100%;
        }
        .left {
            height: auto;
            padding: 40px 30px;
        }
        .right {
            padding: 30px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="toast" id="toast">
    <i class="fas fa-exclamation-circle"></i>
    <span id="toastMessage">{{ error }}</span>
</div>

<div id="login-page">
    <div class="container-login">
        <div class="left">
            <h1>BIENVENIDO<br><span>AL SISTEMA</span></h1>
            <p>Innovación • Tecnología • Futuro</p>
        </div>
        <div class="right">
            <div class="logo">
                <img src="{{ url_for('static', filename='logoemi.png') }}" class="logo-img" alt="Logo EMI">
                <h2>INICIAR SESIÓN</h2>
                <p>Sistema Web Seguro EMI Riberalta</p>
            </div>
            <form id="loginForm" method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
                <div class="input-box">
                    <i class="fas fa-user"></i>
                    <input type="text" name="usuario" id="usuario" placeholder="Usuario" required autocomplete="username">
                </div>
                <div class="input-box">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" id="password" placeholder="Contraseña" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> INICIAR SESIÓN
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toast = document.getElementById('toast');
        const loginForm = document.getElementById('loginForm');
        const error = "{{ error }}";

        if (error && error.trim() !== '') {
            toast.classList.add('show');
            loginForm.classList.add('shake');
            setTimeout(() => loginForm.classList.remove('shake'), 500);
            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }
    });
</script>
{% endblock %}
