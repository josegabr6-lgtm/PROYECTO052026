<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario</title>
    <!-- Bootstrap y Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <style>
        body {
            background: #020b24;
            color: rgb(243, 238, 238);
            font-family: Arial, Helvetica, sans-serif;
            overflow-x: hidden;
        }

        #registro-page {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #registro-page::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)),
                        url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3')
                        center/cover no-repeat;
            z-index: -1;
        }

        .container-registro {
            width: 700px;
            background: rgba(8,18,45,0.95);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(0,153,255,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
            color: #00bfff;
        }

        input, select {
            width: 100%;
            height: 55px;
            margin-top: 15px;
            background-color: #001233; /* Fondo oscuro */
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 15px;
            outline: none;
            padding-left: 20px;
            color: rgb(250, 250, 250);
            font-size: 18px;
        }

        input:focus, select:focus {
            border-color: #00bfff;
            box-shadow: 0 0 10px #00bfff;
        }

        option {
            background-color: #505b71; /* Fondo oscuro para opciones */
            color: #ffffff; /* Texto blanco */
        }

        button {
            width: 100%;
            height: 55px;
            margin-top: 25px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(90deg,#0072ff,#00bfff);
            color: rgb(228, 221, 221);
            font-size: 20px;
            font-weight: bold;
            transition: 0.4s;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #00bfff;
        }

        a {
            display: block;
            text-align: center;
            color: #00bfff;
            margin-top: 15px;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div id="registro-page">
    <div class="container-registro">
        <h2><i class="fas fa-user-plus"></i> Registrar nuevo usuario</h2>
        <form method="POST" action="/registro">
            <input type="text" name="nombre" placeholder="Nombre" required>
            <input type="text" name="apellido" placeholder="Apellido" required>
            <input type="text" name="usuario" placeholder="Usuario" required>
            <input type="email" name="correo" placeholder="Correo" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <select name="rol" required>
                <option value="">Seleccionar rol...</option>
                <option value="estudiante">Estudiante</option>
                <option value="docente">Docente</option>
                <option value="admin">Administrador</option>
            </select>
            <button type="submit"><i class="fas fa-save"></i> Registrar</button>
        </form>

        <a href="{{ url_for('login') }}"><i class="fas fa-arrow-left"></i> Volver al inicio de sesión</a>

        {% if mensaje %}
            <p style="color:#00ff99; text-align:center; margin-top:15px;">{{ mensaje }}</p>
        {% endif %}
    </div>
</div>
</body>
</html>
