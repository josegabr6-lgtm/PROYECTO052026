{% extends "base.html" %}

{% block title %}Restablecer Contraseña - Sistema EMI{% endblock %}

{% block head %}
<style>
    .form-control {
        background: #001233;
        border: 1px solid #00bfff;
        color: white;
    }
    .form-control:focus {
        box-shadow: 0 0 0 0.2rem rgba(0, 191, 255, 0.25);
    }
    .btn-primary {
        background: linear-gradient(90deg,#0072ff,#00bfff);
        border: none;
        border-radius: 10px;
        font-weight: bold;
        padding: 12px 25px;
    }
</style>
{% endblock %}

{% block content %}
<div class="container container-app">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mb-4">Nueva Contraseña</h2>
            
            <p class="text-center text-muted mb-4">
                Ingresa tu nueva contraseña. Debe tener al menos 6 caracteres.
            </p>
            
            {% if error %}
            <div class="alert alert-danger text-center" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
            </div>
            {% endif %}
            
            <form method="POST" action="{{ url_for('restablecer_password', token=token) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="mb-3">
                    <input type="password" class="form-control" name="password" placeholder="Nueva contraseña" required minlength="6" autocomplete="new-password">
                </div>
                
                <div class="mb-3">
                    <input type="password" class="form-control" name="confirm_password" placeholder="Confirmar contraseña" required minlength="6" autocomplete="new-password">
                </div>
                
                <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-save me-2"></i>Actualizar contraseña
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
