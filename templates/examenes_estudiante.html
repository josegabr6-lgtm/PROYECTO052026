<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Exámenes disponibles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #020b24; color: white; font-family: Arial, Helvetica, sans-serif; }
        .container { margin-top: 50px; background: rgba(8,18,45,0.95); padding: 40px; border-radius: 20px; box-shadow: 0 0 30px rgba(0,183,255,0.3); }
        h2 { color: #00bfff; text-align: center; margin-bottom: 30px; }
        table { color: white; margin-top: 30px; }
        th { color: #00bfff; }
        .btn-primary { background: linear-gradient(90deg,#0072ff,#00bfff); border: none; border-radius: 10px; color: white; font-weight: bold; padding: 8px 20px; transition: 0.3s; }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 0 20px #00bfff; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Exámenes disponibles</h2>
        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Descripción</th>
                    <th>Fecha</th>
                    <th>Preguntas</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
                {% for examen in examenes %}
                <tr>
                    <td>{{ examen.id_examen }}</td>
                    <td>{{ examen.titulo }}</td>
                    <td>{{ examen.descripcion }}</td>
                    <td>{{ examen.fecha }}</td>
                    <td>{{ examen.num_preguntas }}</td>
                    <td>
                        <form method="GET" action="/resolver_examen">
                            <input type="hidden" name="id_examen" value="{{ examen.id_examen }}">
                            <button type="submit" class="btn-primary">Resolver</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <div style="text-align:center; margin-top:20px;">
            <a href="/panel" class="btn btn-primary">Volver</a>
        </div>
    </div>
</body>
</html>
