<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Estudiante - Sistema EMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #020b24; color: white; font-family: Arial, Helvetica, sans-serif; }
        .container { margin-top: 60px; background: rgba(8,18,45,0.95); padding: 40px; border-radius: 20px; box-shadow: 0 0 30px rgba(0,183,255,0.3); }
        h2 { color: #00bfff; text-align: center; margin-bottom: 30px; }
        input { width: 100%; margin-top: 15px; background: #001233; border: 1px solid #00bfff; border-radius: 10px; color: white; padding: 10px; }
        .btn-primary { margin-top: 25px; background: linear-gradient(90deg,#0072ff,#00bfff); border: none; border-radius: 10px; color: white; font-weight: bold; padding: 12px 25px; transition: 0.3s; }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 0 20px #00bfff; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Registrar nuevo estudiante</h2>
        <form method="POST" action="/registro_estudiante">
            <input type="text" name="nombre" placeholder="Nombre" required>
            <input type="text" name="apellido" placeholder="Apellido" required>
            <input type="text" name="usuario" placeholder="Usuario" required>
            <input type="email" name="correo" placeholder="Correo electrónico" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit" class="btn-primary">Registrar estudiante</button>
        </form>
        {% if mensaje %}
        <p style="color:#00bfff; text-align:center; margin-top:20px;">{{ mensaje }}</p>
        {% endif %}
    </div>
</body>
</html>
