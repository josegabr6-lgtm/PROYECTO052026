{% extends "base.html" %}

{% block title %}Registrar Estudiante - Sistema EMI{% endblock %}

{% block head %}
<style>
    .form-control {
        background: #001233;
        border: 1px solid #00bfff;
        color: white;
    }
    .form-control:focus {
        box-shadow: 0 0 0 0.2rem rgba(0, 191, 255, 0.25);
    }
    .btn-primary {
        background: linear-gradient(90deg,#0072ff,#00bfff);
        border: none;
        border-radius: 10px;
        font-weight: bold;
        padding: 12px 25px;
    }
</style>
{% endblock %}

{% block content %}
<div class="container container-app">
    <h2 class="text-center mb-4">Registrar nuevo estudiante</h2>
    <form method="POST" action="/registro_estudiante">
        <div class="mb-3">
            <input type="text" class="form-control" name="nombre" placeholder="Nombre" required>
        </div>
        <div class="mb-3">
            <input type="text" class="form-control" name="apellido" placeholder="Apellido" required>
        </div>
        <div class="mb-3">
            <input type="text" class="form-control" name="usuario" placeholder="Usuario" required>
        </div>
        <div class="mb-3">
            <input type="email" class="form-control" name="correo" placeholder="Correo electrónico" required>
        </div>
        <div class="mb-3">
            <input type="password" class="form-control" name="password" placeholder="Contraseña" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Registrar estudiante</button>
    </form>

    {% if mensaje %}
    <p class="text-center text-info mt-4">{{ mensaje }}</p>
    {% endif %}
</div>
{% endblock %}
